# feede2
feeder: feeders.feeder_ntu.Feeder
train_feeder_args:
  data_path: data/ntu/NTU60_CS.npz
  split: train
  run: 1
  debug: False
  random_choose: False
  random_shift: False
  random_move: False
  window_size: 64
  normalization: False
  random_rot: True
  p_interval: [0.5, 1]
  vel: False
  bone: False

test_feeder_args_unseen:
  data_path: data/ntu/NTU60_CS.npz
  split: test_unseen
  run: 1
  window_size: 64
  p_interval: [0.95]
  vel: False
  bone: False
  debug: False
test_feeder_args_seen:
  data_path: data/ntu/NTU60_CS.npz
  split: test_seen
  run: 5
  window_size: 64
  p_interval: [0.95]
  vel: False
  bone: False
  debug: False
# model
model: model.ctrgcn.Model
model_args:
  num_class: 40
  num_point: 25
  num_person: 2
  graph: graph.ntu_rgb_d.Graph
  graph_args:
    labeling_mode: 'spatial'
model_args_velocity:
  num_class: 40
  num_point: 25
  num_person: 2
  graph: graph.ntu_rgb_d.Graph_velocity
  graph_args:
    labeling_mode: 'spatial'
model_args_bone:
  num_class: 40
  num_point: 10
  num_person: 2
  graph: graph.ntu_rgb_d.Graph_bone
  graph_args:
    labeling_mode: 'spatial'

#optim
weight_decay: 0.0004
base_lr: 0.1
lr_decay_rate: 0.1
step: [25, 45, 60]
warm_up_epoch: 5

# training
device: [0]
batch_size: 64
test_batch_size: 64
num_epoch: 60
nesterov: True
