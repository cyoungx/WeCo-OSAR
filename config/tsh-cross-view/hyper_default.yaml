# feeder
feeder: feeders.feeder_tsh.Feeder
train_feeder_args:
  data_path: ./data/smarthome/xview/train_data_joint.npy
  label_path: ./data/smarthome/xview/train_label.pkl
  split: train
  run: 1
  debug: False
  random_choose: False
  random_shift: False
  random_move: False
  window_size: 224
  normalization: False
  random_rot: True
  p_interval: [0.5, 1]
  vel: False
  bone: False

test_feeder_args_unseen:
  data_path: ./data/smarthome/xview/test_data_joint.npy
  label_path: ./data/smarthome/xview/test_label.pkl
  split: test_unseen
  run: 1
  window_size: 224
  p_interval: [0.95]
  vel: False
  bone: False
  debug: False

test_feeder_args_seen:
  data_path: ./data/smarthome/xview/test_data_joint.npy
  label_path: ./data/smarthome/xview/test_label.pkl
  split: test_seen
  run: 1
  window_size: 224
  p_interval: [0.95]
  vel: False
  bone: False
  debug: False
# model
model: model.hyperformer.Model
model_args:
  num_class: 10
  num_point: 15
  num_person: 1
  graph: graph.smarthome.Graph
  graph_args:
    labeling_mode: 'spatial'
  joint_label: [2, 2, 2, 2, 2, 3, 3, 2, 2, 3, 3, 3, 3, 1, 0]
model_args_velocity:
  num_class: 10
  num_point: 15
  num_person: 1
  graph: graph.smarthome.Graph_velocity
  graph_args:
    labeling_mode: 'spatial'
model_args_bone:
  num_class: 10
  num_point: 10
  num_person: 1
  graph: graph.smarthome.Graph_bone
  graph_args:
    labeling_mode: 'spatial'
#optim
weight_decay: 0.0001
base_lr: 0.1
lr_decay_rate: 0.1
step: [25, 45, 60]
warm_up_epoch: 5

# training
device: [0, 1, 2, 3]
batch_size: 64
test_batch_size: 64
num_epoch: 60
nesterov: True

